server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml application/manifest+json;
    gzip_min_length 1024;

    # The service worker, registration shim, entry HTML and manifest must never
    # be cached hard — that's how new versions reach already-installed clients.
    location = /sw.js              { add_header Cache-Control "no-cache"; }
    location = /registerSW.js      { add_header Cache-Control "no-cache"; }
    location = /index.html         { add_header Cache-Control "no-cache"; }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        default_type application/manifest+json;
    }

    # Content-hashed build assets are immutable — cache them for a year.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Animal sounds: the service worker already versions them; let the browser
    # revalidate so swapped files are picked up.
    location /sounds/ {
        add_header Cache-Control "public, max-age=86400";
    }

    # SPA fallback — unknown paths return the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
