<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="36" height="36">
  <!-- Cuckoo — flat emoji style: grey-brown bird with long tail and barred belly -->
  <!-- long tail (down-left) -->
  <path d="M14 22 L4 31 a2 2 0 0 0 2.6 2.6 L17 26 Z" fill="#6d7480"/>
  <path d="M4.4 30.6 L4 31 a2 2 0 0 0 2.6 2.6 L7.2 33.1 Z" fill="#eceff1"/>
  <!-- body -->
  <ellipse cx="18" cy="20" rx="9.5" ry="8" fill="#8a93a3"/>
  <!-- pale barred belly -->
  <path d="M12 22 a6.5 6 0 0 0 12 1 a6.5 6 0 0 1 -12 -1 Z" fill="#e9edf2"/>
  <line x1="13" y1="22.4" x2="22.5" y2="22.8" stroke="#aeb7c4" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="13.2" y1="24.2" x2="22.2" y2="24.4" stroke="#aeb7c4" stroke-width="0.9" stroke-linecap="round"/>
  <!-- wing -->
  <path d="M9 17 q7 -3 13 1 q-6 5 -13 2 Z" fill="#6d7480"/>
  <!-- head -->
  <circle cx="25" cy="14" r="6.4" fill="#8a93a3"/>
  <!-- little crest -->
  <path d="M23 8.4 q1.4 -2 3 0 q-1.6 0.8 -3 0 Z" fill="#6d7480"/>
  <!-- beak (slightly downcurved) -->
  <path d="M30.8 13.4 q4 0.4 3.4 2.4 q-2 -0.3 -3.7 0.2 Z" fill="#e8a23d"/>
  <path d="M30.8 13.4 q4 0.4 3.4 2.4 l-0.2 -0.8 q-1.6 -1 -3.2 -1.2 Z" fill="#c9852b"/>
  <!-- eye -->
  <circle cx="26" cy="13.2" r="1.7" fill="#2b2f36"/>
  <circle cx="26.6" cy="12.6" r="0.55" fill="#fff"/>
  <!-- feet -->
  <line x1="16.5" y1="27.5" x2="16.5" y2="30.5" stroke="#e8a23d" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="20" y1="27.6" x2="20" y2="30.5" stroke="#e8a23d" stroke-width="1.3" stroke-linecap="round"/>
</svg>
